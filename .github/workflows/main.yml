name: Build MeshCore WiFi Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build firmware
        run: |
          chmod +x run-build.sh
          ./run-build.sh --ssid "${{ secrets.ASYS4G }}" --password "${{ secrets.boostboost24 }}" --commit dee3e26 --version 1.15.0

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: meshcore-wifi-firmware
          path: |
            firmware-output/*.bin
          retention-days: 7
